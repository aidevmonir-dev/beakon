# Fly.io deploy config for the Beakon backend.
# Rename `app` to your actual Fly app name (e.g. after `fly launch`).
#
# Database: point DATABASE_URL at a Neon / Supabase Postgres instance
# (or a Fly Postgres cluster). Set via `fly secrets set DATABASE_URL="..."`.
#
# Migrations run once on each release via `release_command`; the app won't
# come up with an unmigrated schema.

app = "beakon-api"           # change to your fly app name
primary_region = "iad"       # us-east; pick the nearest region

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DEBUG = "False"
  # ALLOWED_HOSTS / CORS_ALLOWED_ORIGINS / FRONTEND_URL etc. set via secrets.

[deploy]
  release_command = "python manage.py migrate --noinput"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0    # set to 1 if Thomas can't tolerate a ~1s cold start
  processes = ["app"]

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"

[[vm]]
  memory = "512mb"            # bump to 1gb if WeasyPrint PDF jobs OOM
  cpu_kind = "shared"
  cpus = 1
